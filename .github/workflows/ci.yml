name: Actions App CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bfrost
          POSTGRES_USER: bfrost
          POSTGRES_PASSWORD: bfrost
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SERVER_PORT: ${{ vars.SERVER_PORT }}
      SPRING_PROFILES_ACTIVE: ${{ secrets.APP_ENV }}
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bfrost
      SPRING_DATASOURCE_USERNAME: bfrost
      SPRING_DATASOURCE_PASSWORD: bfrost
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-java${{ matrix.java }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build
        run: mvn clean package -DskipTests -Djavac.executable=javac

      - name: Run tests
        run: mvn test -Djavac.executable=javac