spring.application.name=BFrost-Backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bfrost}
spring.datasource.username=${DB_USERNAME:bfrost}
spring.datasource.password=${DB_PASSWORD:bfrost}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

server.port=${PORT:8080}

bfrost.jwt.access-token-expiry-ms=900000
bfrost.jwt.refresh-token-expiry-ms=604800000
bfrost.jwt.secret=${JWT_SECRET:dev-secret-change-me-to-a-long-random-32char-min-value}
bfrost.jwt.cookie-secure=${COOKIE_SECURE:false}

bfrost.jwt.cookie-same-site=${COOKIE_SAME_SITE:Lax}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:default_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:default_google_client_secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

bfrost.oauth2.frontend-redirect-uri=${OAUTH2_FRONTEND_REDIRECT:http://localhost:3000/oauth/callback}
bfrost.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT:http://localhost:3000/sign-in}
bfrost.oauth2.registration-redirect-uri=${OAUTH2_REGISTRATION_REDIRECT:http://localhost:3000/oauth/complete-registration}
bfrost.oauth2.registration-token-expiry-ms=900000

bfrost.storage.upload-dir=${UPLOAD_DIR:uploads}
bfrost.storage.base-url=${BASE_URL:http://localhost:8080}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info