spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

server.port=${PORT:8080}

bfrost.jwt.secret=${JWT_SECRET}
bfrost.jwt.access-token-expiry-ms=900000
bfrost.jwt.refresh-token-expiry-ms=604800000

bfrost.storage.upload-dir=${UPLOAD_DIR:/var/lib/bfrost/uploads}
bfrost.storage.base-url=${BASE_URL}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never